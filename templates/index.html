<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Blip</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyATNHXHDRokeeiP6sjzPK1zUeAHKFrEYBQ",
      authDomain: "foodblip-1a771.firebaseapp.com",
      projectId: "foodblip-1a771",
      storageBucket: "foodblip-1a771.firebasestorage.app",
      messagingSenderId: "548159935659",
      appId: "1:548159935659:web:884c7adbd4f354900953ee"
    };
    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    window._db = db;
    window._doc = doc;
    window._getDoc = getDoc;
    window._setDoc = setDoc;
    window._updateDoc = updateDoc;
    window._increment = increment;
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --border: #2a2a2a;
      --accent: #ff6a00; --accent2: #ff9a44; --text: #f0f0f0;
      --muted: #888; --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 16px 80px; }
    header { text-align: center; padding: 48px 0 32px; }
    header p { color: var(--muted); margin-top: 8px; font-size: 1rem; }
    .search-box { max-width: 640px; margin: 0 auto 40px; display: flex; flex-direction: column; gap: 12px; }
    .search-box input { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; color: var(--text); font-size: 1rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.2s; }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--muted); }
    .search-box button { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 1rem; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; transition: opacity 0.2s; }
    .search-box button:hover { opacity: 0.88; }
    #results { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, border-color 0.2s; }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); }
    .card-photo { width: 100%; height: 160px; object-fit: cover; background: var(--border); }
    .card-photo-placeholder { width: 100%; height: 160px; background: linear-gradient(135deg, #1f1f1f, #2a2a2a); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .card-name { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
    .card-address { color: var(--muted); font-size: 0.8rem; line-height: 1.4; }
    .rating-row { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
    .stars { color: var(--accent); font-weight: 700; }
    .review-count { color: var(--muted); font-size: 0.78rem; }
    .distance-row { display: flex; align-items: center; gap: 6px; font-size: 0.83rem; color: var(--muted); }
    .distance-row span { color: var(--text); font-weight: 500; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .card-footer a { flex: 1; display: block; text-align: center; border-radius: 10px; padding: 9px 6px; text-decoration: none; font-weight: 700; font-size: 0.78rem; font-family: 'Syne', sans-serif; transition: background 0.2s, color 0.2s; }
    .btn-maps { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-maps:hover { background: var(--accent); color: #fff; }
    .btn-route { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; }
    .btn-route:hover { opacity: 0.85; }
    #status { text-align: center; color: var(--muted); font-size: 0.95rem; margin: 20px 0; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; padding: 20px 16px 24px; margin-top: 40px; border-top: 1px solid var(--border); }
    .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #F47B20, #CC2529); z-index: 9999; transition: width 0.3s ease; }
    .emoji-loader { text-align: center; padding: 32px 0 16px; width: 100%; display: block; }
    .emoji-loader span { font-size: 2.2rem; display: inline-block; animation: bounce 0.8s ease-in-out infinite; transform-origin: bottom center; }
    .emoji-loader span:nth-child(2) { animation-delay: 0.15s; }
    .emoji-loader span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scaleY(1); }
      40% { transform: translateY(-18px) scaleY(1.05); }
      70% { transform: translateY(2px) scaleY(0.95); }
    }
    .emoji-loader p { color: var(--muted); font-size: 0.85rem; margin-top: 12px; font-weight: 500; }
    .tag { background: #222; border: 1px solid var(--border); border-radius: 20px; padding: 3px 11px; font-size: 0.76rem; color: var(--muted); }
    .tag.open { color: var(--green); border-color: var(--green); }
    .tag.closed { color: var(--red); border-color: var(--red); }
    .busy-section { display: flex; flex-direction: column; gap: 6px; }
    .busy-label-row { display: flex; justify-content: space-between; font-size: 0.8rem; }
    .busy-label-row span:first-child { color: var(--muted); }
    .busy-gauge-track { width: 100%; height: 10px; background: #2a2a2a; border-radius: 99px; overflow: hidden; }
    /* Animated Busy Gauge Variables */
    .busy-gauge-fill { height: 100%; border-radius: 99px; width: 0% !important; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .busy-gauge-fill.animated { width: var(--target-width) !important; }
    .busy-quiet { background: var(--green); }
    .busy-moderate { background: var(--yellow); }
    .busy-fairly { background: #f97316; }
    .busy-very { background: var(--red); }
    .halaal-section { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .halaal-title { font-size: 0.8rem; color: var(--muted); }
    .halaal-verdict { font-size: 0.9rem; font-weight: 700; }
    .halaal-votes { font-size: 0.75rem; color: var(--muted); }
    .halaal-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .halaal-btn { flex: 1; border: none; border-radius: 8px; padding: 7px 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
    .halaal-btn:hover { opacity: 0.8; }
    .btn-yes { background: #14532d; color: var(--green); }
    .btn-no { background: #450a0a; color: var(--red); }
    .btn-unsure { background: #292524; color: var(--yellow); }
    .card-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  </style>
</head>
<body>

  <header>
    <img src="https://i.postimg.cc/HsNrmL41/logo-2-transp.png" alt="Food Blip Logo" style="width:min(880px, 90vw); height:auto; object-fit:contain; margin:0 auto 8px; display:block;"/>
    <h1 style="font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; background:linear-gradient(135deg,#F47B20,#CC2529); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-1px; margin-bottom:8px;">Food Blip</h1>
    <p>Find out how busy a spot is before you drive there 🔥</p>
  </header>

  <div class="search-box">
    <input type="text" id="query" placeholder="Restaurant name (e.g. Nandos)"/>
    <div style="display:flex; gap:8px;">
      <input type="text" id="location" placeholder="Your area (e.g. Kuilsriver, Cape Town)" style="flex:1;"/>
      <button onclick="detectLocation()" style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; color:var(--accent); font-size:1.2rem; cursor:pointer;">📍</button>
    </div>
    <button onclick="search()">🔍 Check It Out</button>
    <button onclick="surpriseMe()" style="background:linear-gradient(135deg,#7c3aed,#a855f7); border:none; border-radius:12px; padding:14px; color:#fff; font-size:1rem; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; transition:opacity 0.2s;">🎲 Surprise Me</button>
  </div>

  <div style="max-width:960px; margin:0 auto 20px;">
    <button onclick="toggleLeaderboard()" id="leaderboardBtn" style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 18px; color:var(--muted); font-size:0.85rem; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; transition:all 0.2s;">🏆 Show Local Leaderboard</button>
    <div id="leaderboard" style="display:none; margin-top:16px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px;">
      <div style="font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; margin-bottom:12px; background:linear-gradient(135deg,#F47B20,#CC2529); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">🏆 Top Spots — Community Ranked</div>
      <div id="leaderboardList" style="display:flex; flex-direction:column; gap:8px;">
        <div style="color:var(--muted); font-size:0.85rem;">Search for restaurants first to build the leaderboard!</div>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <div style="max-width:960px; margin:0 auto 16px; display:flex; gap:8px;">
    <button id="halaalFilterBtn" onclick="toggleHalaalFilter()" style="background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 18px; color:var(--muted); font-size:0.85rem; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; transition:all 0.2s;">🕌 Show Halaal Only</button>
  </div>

  <div id="results"></div>

  <div class="progress-bar" id="progressBar" style="width:0; display:none;"></div>

  <footer>
    <img src="https://i.postimg.cc/gjNzkGw2/footer-obs.png" alt="Created by" style="width:min(320px, 80vw); height:auto; opacity:0.1;"/>
  </footer>

<script type="module">

  /* ── Firebase helpers ── */
  function waitForFirebase() {
    return new Promise(resolve => {
      if (window._db) return resolve();
      const id = setInterval(() => { if (window._db) { clearInterval(id); resolve(); } }, 100);
    });
  }

  async function loadHalaal(placeId) {
    await waitForFirebase();
    const ref  = window._doc(window._db, "halaal", placeId);
    const snap = await window._getDoc(ref);
    return snap.exists() ? snap.data() : { yes: 0, no: 0, unsure: 0 };
  }

  async function voteHalaal(placeId, vote) {
    await waitForFirebase();
    const ref  = window._doc(window._db, "halaal", placeId);
    const snap = await window._getDoc(ref);
    if (snap.exists()) {
      await window._updateDoc(ref, { [vote]: window._increment(1) });
    } else {
      const data = { yes: 0, no: 0, unsure: 0 };
      data[vote] = 1;
      await window._setDoc(ref, data);
    }
    return loadHalaal(placeId);
  }

  async function loadReactions(placeId) {
    await waitForFirebase();
    const ref  = window._doc(window._db, "reactions", placeId);
    const snap = await window._getDoc(ref);
    return snap.exists() ? snap.data() : { fire: 0, solid: 0, skip: 0 };
  }

  /* ── Reaction handler ── */
  window.react = async function (placeId, type) {
    await waitForFirebase();
    const ref  = window._doc(window._db, "reactions", placeId);
    const snap = await window._getDoc(ref);
    if (snap.exists()) {
      await window._updateDoc(ref, { [type]: window._increment(1) });
    } else {
      const data = { fire: 0, solid: 0, skip: 0 };
      data[type] = 1;
      await window._setDoc(ref, data);
    }
    const updated = await loadReactions(placeId);
    document.getElementById(`fire-${placeId}`).textContent  = `🔥 Amazing (${updated.fire})`;
    document.getElementById(`solid-${placeId}`).textContent = `👍 Solid (${updated.solid})`;
    document.getElementById(`skip-${placeId}`).textContent  = `👎 Skip It (${updated.skip})`;
  };

  /* ── Helpers ── */
  function getHalaalVerdict(data, systemGuess) {
    const total = data.yes + data.no + data.unsure;
    if (total === 0) {
      return systemGuess === "likely"
        ? { text: "✅ Likely Halaal", color: "#4ade80" }
        : { text: "❓ Unknown — vote below", color: "#888" };
    }
    if (data.yes > data.no && data.yes > data.unsure) return { text: `✅ Halaal (${data.yes} votes)`, color: "#4ade80" };
    if (data.no  > data.yes && data.no  > data.unsure) return { text: `❌ Not Halaal (${data.no} votes)`, color: "#f87171" };
    return { text: `⚠️ Unsure (${data.unsure} unsure)`, color: "#fbbf24" };
  }

  function getBusyClass(busy) {
    if (busy >= 75) return "busy-very";
    if (busy >= 50) return "busy-fairly";
    if (busy >= 30) return "busy-moderate";
    return "busy-quiet";
  }

  // Fixed syntax template literal bracket positioning error here
  function getRoute(userLat, userLng, destLat, destLng) {
    return (userLat && userLng)
      ? `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${destLat},${destLng}`
      : `https://www.google.com/maps/search/?api=1&query=${destLat},${destLng}`;
  }

  /* ── Progress bar helpers ── */
  function showProgress() {
    const bar = document.getElementById("progressBar");
    bar.style.display = "block";
    bar.style.width   = "0%";
    requestAnimationFrame(() => { bar.style.width = "85%"; bar.style.transition = "width 2s ease"; });
  }
  function finishProgress() {
    const bar = document.getElementById("progressBar");
    bar.style.transition = "width 0.2s ease";
    bar.style.width = "100%";
    setTimeout(() => { bar.style.display = "none"; bar.style.width = "0"; }, 300);
  }

  /* ── Leaderboard ── */
  let leaderboardData = {};
  let leaderboardOpen = false;

  window.toggleLeaderboard = function () {
    leaderboardOpen = !leaderboardOpen;
    const board = document.getElementById("leaderboard");
    const btn   = document.getElementById("leaderboardBtn");
    board.style.display   = leaderboardOpen ? "block" : "none";
    btn.style.background  = leaderboardOpen ? "#1a1a1a" : "var(--card)";
    btn.style.color       = leaderboardOpen ? "var(--accent)" : "var(--muted)";
    btn.style.borderColor = leaderboardOpen ? "var(--accent)" : "var(--border)";
    btn.textContent       = leaderboardOpen ? "🏆 Hide Leaderboard" : "🏆 Show Local Leaderboard";
    if (leaderboardOpen) renderLeaderboard();
  };

  function renderLeaderboard() {
    const list    = document.getElementById("leaderboardList");
    const entries = Object.values(leaderboardData);
    if (entries.length === 0) {
      list.innerHTML = `<div style="color:var(--muted); font-size:0.85rem;">Search for restaurants first to build the leaderboard!</div>`;
      return;
    }
    entries.sort((a, b) => (b.fire + b.solid) - (a.fire + a.solid));
    list.innerHTML = entries.slice(0, 5).map((e, i) => `
      <div style="display:flex; align-items:center; gap:12px; padding:10px; background:#111; border-radius:10px;">
        <div style="font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; color:${i===0?'#F47B20':i===1?'#888':i===2?'#cd7f32':'var(--muted)'};">
          ${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}
        </div>
        <div style="flex:1;">
          <div style="font-weight:700; font-size:0.9rem;">${e.name}</div>
          <div style="color:var(--muted); font-size:0.75rem;">🔥 ${e.fire} Amazing · 👍 ${e.solid} Solid · 👎 ${e.skip} Skip</div>
        </div>
        <div style="color:var(--accent); font-weight:700; font-size:0.85rem;">⭐ ${e.rating}</div>
      </div>
    `).join("");
  }

  /* ── Halaal filter ── */
  let halaalFilterOn = false;

  window.toggleHalaalFilter = function () {
    halaalFilterOn = !halaalFilterOn;
    const btn = document.getElementById("halaalFilterBtn");
    if (halaalFilterOn) {
      btn.style.background  = "#14532d";
      btn.style.color       = "#4ade80";
      btn.style.borderColor = "#4ade80";
      btn.textContent       = "✅ Halaal Only — ON";
    } else {
      btn.style.background  = "var(--card)";
      btn.style.color       = "var(--muted)";
      btn.style.borderColor = "var(--border)";
      btn.textContent       = "🕌 Show Halaal Only";
    }
    document.querySelectorAll(".card").forEach(card => {
      const verdict = card.querySelector(".halaal-verdict");
      card.style.display = halaalFilterOn
        ? (verdict && verdict.textContent.includes("✅") ? "flex" : "none")
        : "flex";
    });
  };

  /* ── Main search ── */
  window.search = async function () {
    const query    = document.getElementById("query").value.trim();
    const location = document.getElementById("location").value.trim();
    if (!query || !location) {
      document.getElementById("status").innerHTML = "⚠️ Please fill in both fields.";
      return;
    }

    document.getElementById("status").innerHTML = "";
    const container = document.getElementById("results");
    container.innerHTML = `
      <div class="emoji-loader" id="emojiLoader">
        <span>🍔</span><span>🌮</span><span>🍕</span>
        <p>Finding spots near you...</p>
      </div>`;
    showProgress();

    let userLat = null, userLng = null;
    try {
      await new Promise(res => {
        navigator.geolocation.getCurrentPosition(
          pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; res(); },
          () => res(),
          { timeout: 3000 }
        );
      });
    } catch (e) {}

    try {
      const res  = await fetch(`/search?query=${encodeURIComponent(query)}&location=${encodeURIComponent(location)}`);
      const data = await res.json();

      container.innerHTML = "";
      finishProgress();

      if (data.error) {
        document.getElementById("status").innerHTML = `❌ ${data.error} — try a different spelling?`;
        return;
      }

      document.getElementById("status").innerHTML = `Found <strong>${data.length}</strong> spots`;

      for (const place of data) {
        const [halaalData, reactionData] = await Promise.all([
          loadHalaal(place.place_id),
          loadReactions(place.place_id)
        ]);

        const verdict   = getHalaalVerdict(halaalData, place.halaal);
        const busyClass = getBusyClass(place.busy);
        const routeUrl  = getRoute(userLat, userLng, place.dest_lat, place.dest_lng);
        const stars     = place.rating !== "N/A"
          ? "★".repeat(Math.round(place.rating)) + "☆".repeat(5 - Math.round(place.rating))
          : "—";
        const openTag = place.open_now
          ? `<span class="tag open">🟢 Open Now</span>`
          : `<span class="tag closed">🔴 Closed</span>`;
        const photoEl = place.photo_url
          ? `<img class="card-photo" src="${place.photo_url}" alt="${place.name}"/>`
          : `<div class="card-photo-placeholder">🍽️</div>`;
        const peakBars = (place.peak_hours || []).map((b, h) =>
          `<div title="${h}:00 — ${b}% busy" style="flex:1; height:${b}%; background:${b>=75?'#f87171':b>=50?'#f97316':b>=30?'#fbbf24':'#4ade80'}; border-radius:2px; opacity:${h===new Date().getHours()?1:0.4};"></div>`
        ).join('');

        leaderboardData[place.place_id] = {
          name: place.name, rating: place.rating,
          fire: reactionData.fire, solid: reactionData.solid, skip: reactionData.skip
        };
        if (leaderboardOpen) renderLeaderboard();

        container.insertAdjacentHTML('beforeend', `
          <div class="card" id="card-${place.place_id}">
            ${photoEl}
            <div class="card-body">
              <div class="card-name">${place.name}</div>
              <div class="card-address">${place.address}</div>
              <div class="rating-row">
                <span class="stars">${stars}</span>
                <strong>${place.rating}</strong>
                <span class="review-count">(${place.reviews.toLocaleString()} reviews)</span>
              </div>
              <div class="distance-row">
                📍 <span>${place.distance}</span>  ·  🚗 <span>${place.drive_time}</span>
              </div>
              <div class="tags">${openTag}</div>
              <div class="busy-section">
                <div class="busy-label-row">
                  <span>How Busy Right Now</span>
                  <span style="color:var(--accent);font-weight:700">${place.busy_label}</span>
                </div>
                <div class="busy-gauge-track">
                  <div class="busy-gauge-fill ${busyClass}" style="--target-width:${place.busy}%"></div>
                </div>
                <div style="font-size:0.72rem;color:var(--muted);margin-bottom:6px;">Based on typical patterns for this time</div>
                <div style="font-size:0.75rem;color:var(--muted);margin-bottom:4px;">📊 Busy throughout the day</div>
                <div style="display:flex; align-items:flex-end; gap:2px; height:32px;">${peakBars}</div>
                <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:var(--muted); margin-top:2px;">
                  <span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>11pm</span>
                </div>
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button onclick="react('${place.place_id}','fire')"  style="flex:1; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:8px; cursor:pointer; font-size:0.8rem; color:#f0f0f0; font-weight:700;" id="fire-${place.place_id}">🔥 Amazing (${reactionData.fire})</button>
                <button onclick="react('${place.place_id}','solid')" style="flex:1; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:8px; cursor:pointer; font-size:0.8rem; color:#f0f0f0; font-weight:700;" id="solid-${place.place_id}">👍 Solid (${reactionData.solid})</button>
                <button onclick="react('${place.place_id}','skip')"  style="flex:1; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:8px; cursor:pointer; font-size:0.8rem; color:#f0f0f0; font-weight:700;" id="skip-${place.place_id}">👎 Skip It (${reactionData.skip})</button>
              </div>
              <div class="halaal-section" id="halaal-${place.place_id}">
                <div class="halaal-title">🕌 Halaal Status — Community Verified</div>
                <div class="halaal-verdict" style="color:${verdict.color}">${verdict.text}</div>
                <div class="halaal-votes">Yes: ${halaalData.yes}  |  No: ${halaalData.no}  |  Unsure: ${halaalData.unsure}</div>
                <div class="halaal-buttons">
                  <button class="halaal-btn btn-yes"    onclick="vote('${place.place_id}','yes','${place.halaal}')">✅ Halaal</button>
                  <button class="halaal-btn btn-no"     onclick="vote('${place.place_id}','no','${place.halaal}')">❌ Not Halaal</button>
                  <button class="halaal-btn btn-unsure" onclick="vote('${place.place_id}','unsure','${place.halaal}')">⚠️ Not Sure</button>
                </div>
              </div>
            </div>
            <div class="card-footer">
              <a class="btn-maps" href="${place.maps_link}" target="_blank">📍 View on Maps</a>
              <a class="btn-route" href="${routeUrl}" target="_blank">🧭 Get Route</a>
            </div>
            <div style="padding:0 12px 12px;">
              <a href="https://wa.me/?text=${encodeURIComponent(`🍔 *${place.name}*\n⭐ ${place.rating} (${place.reviews} reviews)\n📍 ${place.distance} away · 🚗 ${place.drive_time}\n\nChecked on Food Blip 👉 https://foodblip.vercel.app`)}" target="_blank" style="display:block; text-align:center; background:#25D366; border-radius:10px; padding:9px; color:#fff; text-decoration:none; font-weight:700; font-size:0.82rem; font-family:'Syne',sans-serif;">
                📲 Share on WhatsApp
              </a>
            </div>
          </div>`);
      }

      // Smooth trigger for expanding gauges and firing confetti bursts on high-tier ratings
      setTimeout(() => {
        let foundTopRated = false;
        data.forEach(place => {
          const card = document.getElementById(`card-${place.place_id}`);
          if (!card) return;
          
          const fill = card.querySelector(".busy-gauge-fill");
          if (fill) fill.classList.add("animated");

          if (place.rating !== "N/A" && parseFloat(place.rating) >= 4.5) {
            foundTopRated = true;
          }
        });

        if (foundTopRated && typeof confetti === "function") {
          confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 }, colors: ['#F47B20', '#CC2529', '#fbbf24'] });
        }
      }, 200);

    } catch (err) {
      container.innerHTML = "";
      finishProgress();
      document.getElementById("status").innerHTML = "❌ Something went wrong. Make sure app.py is running.";
    }
  };

  /* ── Halaal vote handler ── */
  window.vote = async function (placeId, vote, systemGuess) {
    const section   = document.getElementById(`halaal-${placeId}`);
    const verdictEl = section.querySelector(".halaal-verdict");
    const votesEl   = section.querySelector(".halaal-votes");
    verdictEl.textContent = "Saving your vote...";
    const updated = await voteHalaal(placeId, vote);
    const verdict = getHalaalVerdict(updated, systemGuess);
    verdictEl.textContent = verdict.text;
    verdictEl.style.color = verdict.color;
    votesEl.textContent   = `Yes: ${updated.yes} | No: ${updated.no} | Unsure: ${updated.unsure}`;
  };

  /* ── Surprise Me ── */
  window.surpriseMe = async function () {
    const location = document.getElementById("location").value.trim();
    if (!location) { alert("Please enter or detect your location first!"); return; }
    const queries = ["restaurant", "food", "cafe", "grill", "kitchen"];
    document.getElementById("query").value = queries[Math.floor(Math.random() * queries.length)];
    document.getElementById("status").innerHTML = '<span class="spinner"></span> Finding you something good...';
    document.getElementById("results").innerHTML = "";
    await window.search();
    setTimeout(() => {
      const cards = document.querySelectorAll(".card");
      if (cards.length > 0) {
        const pick = cards[Math.floor(Math.random() * cards.length)];
        pick.style.border    = "2px solid #a855f7";
        pick.style.boxShadow = "0 0 20px rgba(168,85,247,0.4)";
        pick.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }, 4000);
  };

  /* ── Detect location ── */
  window.detectLocation = function () {
    const btn = document.querySelector("button[onclick='detectLocation()']");
    btn.textContent = "⏳";
    navigator.geolocation.getCurrentPosition(
      async pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        const res    = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
        const data   = await res.json();
        const suburb = data.address.suburb || data.address.town || data.address.city || "";
        const city   = data.address.city   || data.address.state || "";
        document.getElementById("location").value = `${suburb}, ${city}`;
        btn.textContent = "📍";
      },
      () => { alert("Could not detect location. Please type it manually."); btn.textContent = "📍"; }
    );
  };

  /* ── Enter key shortcuts ── */
  document.getElementById("query").addEventListener("keyup",    e => { if (e.key === "Enter") window.search(); });
  document.getElementById("location").addEventListener("keyup", e => { if (e.key === "Enter") window.search(); });

</script>
</body>
</html>
